# 심각도 등급 기준
severity_levels:
  critical: "즉시 조치 필요 - 보안 인증 불합격 처리"
  high: "우선 조치 필요 - 핵심 보안 요구사항"
  medium: "조치 권장 - 보안 강화 요구사항"
  low: "참고 사항 - 선택적 보안 강화 항목"

