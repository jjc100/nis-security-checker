  - id: "OPS-003"
    title: "보안 설정 내보내기/가져오기"
    category: "운영보안"
    method: "checklist"
    reference: "NIS 영상보안 2.13.3"
    module: "interactive.py"
    severity: "low"
    automated: false

  - id: "OPS-004"
    title: "이상 행동 탐지 및 알람"
    category: "운영보안"
