# 영상보안제품 보안요구사항 적합성 검사 항목 (52개)
items:
  # ── 인증 (Authentication) ──────────────────────────────
  - id: "AUTH-001"
    category: "인증"
    title: "기본 계정 변경 강제"
    description: "초기 관리자 계정(admin/admin 등 기본값)으로 로그인이 불가능한지 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.1.1"

  - id: "AUTH-002"
    category: "인증"
    title: "유추 가능 계정명 금지"
    description: "admin, root, user 등 유추 가능한 계정명 사용 불가 정책 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.1.2"

  - id: "AUTH-003"
    category: "인증"
    title: "로그인 5회 실패 시 잠금"
    description: "로그인 5회 연속 실패 후 계정 잠금 여부 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.1.3"

  - id: "AUTH-004"
    category: "인증"
    title: "잠금 해제 대기시간 5분 이상"
    description: "계정 잠금 후 5분 이상 잠금 유지 여부 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.1.4"

  - id: "AUTH-005"
    category: "인증"
    title: "동일 오류 메시지 반환"
    description: "로그인 실패 시 아이디/패스워드 구분 없이 동일한 오류 메시지 반환 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.1.5"

  - id: "AUTH-006"
    category: "인증"
    title: "2단계 인증 지원 (해당 시)"
    description: "2단계 인증(2FA) 기능 지원 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.1.6"
    condition: "has_2fa"

  - id: "AUTH-007"
    category: "인증"
    title: "ONVIF 인증 필수 적용"
    description: "ONVIF 인터페이스에서 인증 없이 접근 불가 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.1.7"
    condition: "has_onvif"

  - id: "AUTH-008"
    category: "인증"
    title: "RTSP 인증 필수 적용"
    description: "RTSP 스트리밍에서 인증 없이 접근 불가 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.1.8"
    condition: "has_rtsp"

  # ── 접근 제어 (Access Control) ────────────────────────
  - id: "AC-001"
    category: "접근제어"
    title: "권한 분리 (관리자/사용자)"
    description: "관리자와 일반 사용자 권한 분리 여부 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.2.1"

  - id: "AC-002"
    category: "접근제어"
    title: "인증 없는 API 접근 차단"
    description: "인증 토큰 없이 API 엔드포인트 접근 불가 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.2.2"

  - id: "AC-003"
    category: "접근제어"
    title: "세션 타임아웃 10분"
    description: "웹 인터페이스 세션 10분 비활동 후 자동 로그아웃 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.2.3"

  - id: "AC-004"
    category: "접근제어"
    title: "중복 세션 차단"
    description: "동일 계정 중복 로그인 차단 여부 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.2.4"

  - id: "AC-005"
    category: "접근제어"
    title: "세션 토큰 고유성"
    description: "세션 토큰이 매 로그인마다 고유하게 생성되는지 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.2.5"

  - id: "AC-006"
    category: "접근제어"
    title: "불필요 서비스 포트 차단"
    description: "운영에 불필요한 TCP/UDP 포트 개방 여부 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.2.6"

  # ── 암호화 (Cryptography) ─────────────────────────────
  - id: "CRYPT-001"
    category: "암호화"
    title: "TLS 1.2 이상 사용"
    description: "HTTPS 통신에 TLS 1.2 이상 버전만 허용하는지 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.3.1"

  - id: "CRYPT-002"
    category: "암호화"
    title: "취약 TLS 버전 거부 (SSL3/TLS1.0/1.1)"
    description: "SSL 3.0, TLS 1.0, TLS 1.1 접속 시 거부 여부 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.3.2"

  - id: "CRYPT-003"
    category: "암호화"
    title: "강력한 암호 스위트 사용"
    description: "ECDHE/DHE 키 교환, AES-GCM 암호화 등 강력한 암호 스위트 사용 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.3.3"

  - id: "CRYPT-004"
    category: "암호화"
    title: "금지 암호 알고리즘 미사용 (DES/RC4/MD5)"
    description: "바이너리/라이브러리에서 DES, RC4, MD5 등 금지 알고리즘 사용 여부 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.3.4"

  - id: "CRYPT-005"
    category: "암호화"
    title: "패스워드 단방향 해시 저장 (bcrypt/PBKDF2 등)"
    description: "패스워드를 강력한 단방향 해시(bcrypt, PBKDF2, Argon2)로 저장하는지 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.3.5"

  - id: "CRYPT-006"
    category: "암호화"
    title: "솔트(Salt) 적용"
    description: "패스워드 해시에 솔트 적용 여부 및 솔트 길이(16바이트 이상) 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.3.6"

  - id: "CRYPT-007"
    category: "암호화"
    title: "PBKDF2 반복횟수 10,000회 이상"
    description: "PBKDF2 사용 시 반복횟수 10,000회 이상 적용 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.3.7"

  - id: "CRYPT-008"
    category: "암호화"
    title: "하드코딩 암호키 미존재"
    description: "소스코드 또는 바이너리에 하드코딩된 암호화 키 존재 여부 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.3.8"

  # ── 영상 보안 (Video Security) ────────────────────────
  - id: "VIDEO-001"
    category: "영상보안"
    title: "영상 I-frame 암호화"
    description: "녹화 영상의 I-frame(키프레임)에 암호화 적용 여부 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.4.1"

  - id: "VIDEO-002"
    category: "영상보안"
    title: "영상 전송 암호화"
    description: "네트워크로 전송되는 영상 스트림 암호화 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.4.2"

  - id: "VIDEO-003"
    category: "영상보안"
    title: "영상 무결성 검증"
    description: "녹화된 영상 파일의 무결성 검증 기능 지원 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.4.3"

  - id: "VIDEO-004"
    category: "영상보안"
    title: "오디오 암호화 (해당 시)"
    description: "오디오 기능 지원 시 오디오 데이터 암호화 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.4.4"
    condition: "has_audio"

  # ── SSH 보안 ──────────────────────────────────────────
  - id: "SSH-001"
    category: "SSH보안"
    title: "SSH 프로토콜 버전 2 사용"
    description: "SSH 접속 시 SSH-2.0 프로토콜만 허용하는지 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.5.1"
    condition: "has_ssh"

  - id: "SSH-002"
    category: "SSH보안"
    title: "SSH 루트 로그인 비활성화"
    description: "root 계정으로 직접 SSH 로그인 불가 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.5.2"
    condition: "has_ssh"

  - id: "SSH-003"
    category: "SSH보안"
    title: "SSH 패스워드 인증 비활성화 (키 기반 인증)"
    description: "SSH 패스워드 인증 비활성화 및 공개키 인증 사용 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.5.3"
    condition: "has_ssh"

  # ── 감사 로그 (Audit Logging) ─────────────────────────
  - id: "LOG-001"
    category: "감사로그"
    title: "로그인 성공/실패 이벤트 기록"
    description: "로그인 성공 및 실패 이벤트가 감사로그에 기록되는지 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.6.1"

  - id: "LOG-002"
    category: "감사로그"
    title: "감사로그 필수 필드 포함"
    description: "감사로그에 타임스탬프, 이벤트유형, 사용자ID, IP주소 포함 여부 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.6.2"

  - id: "LOG-003"
    category: "감사로그"
    title: "감사로그 내 민감정보 미포함"
    description: "감사로그에 패스워드 등 민감정보가 평문으로 기록되지 않는지 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.6.3"

  - id: "LOG-004"
    category: "감사로그"
    title: "설정 변경 이벤트 기록"
    description: "시스템 설정 변경 이벤트가 감사로그에 기록되는지 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.6.4"

  - id: "LOG-005"
    category: "감사로그"
    title: "감사로그 변조 방지"
    description: "감사로그의 변조 방지 기능(읽기 전용, 해시 체인 등) 적용 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.6.5"

  # ── 파일 시스템 보안 ──────────────────────────────────
  - id: "FS-001"
    category: "파일시스템"
    title: "설정 파일 접근 권한 제한"
    description: "주요 설정 파일이 root만 읽기/쓰기 가능한지 확인 (600 또는 640)"
    method: "graybox"
    reference: "NIS 영상보안 2.7.1"

  - id: "FS-002"
    category: "파일시스템"
    title: "평문 패스워드 설정 파일 저장 금지"
    description: "설정 파일에 패스워드가 평문으로 저장되지 않는지 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.7.2"

  - id: "FS-003"
    category: "파일시스템"
    title: "임시 파일 자동 삭제"
    description: "임시 파일 및 캐시 파일의 자동 삭제 정책 적용 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.7.3"

  # ── 메모리 보안 ───────────────────────────────────────
  - id: "MEM-001"
    category: "메모리보안"
    title: "메모리 내 평문 인증정보 미존재"
    description: "프로세스 메모리 덤프 분석 결과 평문 패스워드 미존재 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.8.1"

  - id: "MEM-002"
    category: "메모리보안"
    title: "메모리 보호 기법 적용 (ASLR/DEP)"
    description: "ASLR(주소 공간 배치 난수화) 및 DEP(데이터 실행 방지) 적용 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.8.2"

  # ── 소프트웨어 보안 ───────────────────────────────────
  - id: "SW-001"
    category: "소프트웨어보안"
    title: "알려진 CVE 취약점 미존재"
    description: "설치된 소프트웨어에 CVSS 7.0 이상의 알려진 CVE가 없는지 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.9.1"

  - id: "SW-002"
    category: "소프트웨어보안"
    title: "펌웨어/소프트웨어 서명 검증"
    description: "펌웨어 업데이트 시 디지털 서명 검증 적용 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.9.2"

  - id: "SW-003"
    category: "소프트웨어보안"
    title: "파일 무결성 검증"
    description: "주요 실행 파일의 SHA-256 해시 무결성 검증 기능 적용 여부 확인"
    method: "graybox"
    reference: "NIS 영상보안 2.9.3"

  - id: "SW-004"
    category: "소프트웨어보안"
    title: "안전한 업데이트 채널 (HTTPS)"
    description: "소프트웨어 업데이트 서버와 HTTPS 통신 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.9.4"

  # ── 네트워크 보안 ─────────────────────────────────────
  - id: "NET-001"
    category: "네트워크보안"
    title: "불필요한 프로토콜 비활성화"
    description: "HTTP(비암호화), Telnet 등 불필요한 프로토콜 비활성화 여부 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.10.1"

  - id: "NET-002"
    category: "네트워크보안"
    title: "RTSP Digest 인증 강도"
    description: "RTSP 401 응답의 Digest 알고리즘이 SHA-256 이상인지 확인"
    method: "blackbox"
    reference: "NIS 영상보안 2.10.2"
    condition: "has_rtsp"

  - id: "NET-003"
    category: "네트워크보안"
    title: "방화벽/ACL 적용"
    description: "네트워크 방화벽 또는 ACL을 통한 접근 제어 적용 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.10.3"

  # ── 개인정보 보호 ─────────────────────────────────────
  - id: "PRIV-001"
    category: "개인정보보호"
    title: "영상 데이터 접근 로그 기록"
    description: "영상 데이터 조회/다운로드 시 접근 로그 기록 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.11.1"

  - id: "PRIV-002"
    category: "개인정보보호"
    title: "마스킹/프라이버시 존 지원"
    description: "특정 영역 마스킹(프라이버시 존) 기능 지원 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.11.2"

  - id: "PRIV-003"
    category: "개인정보보호"
    title: "영상 데이터 보존 기간 정책"
    description: "영상 데이터 보존 기간 설정 및 자동 삭제 기능 지원 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.11.3"

  # ── 물리 보안 ────────────────────────────────────────
  - id: "PHY-001"
    category: "물리보안"
    title: "물리적 포트 비활성화 (USB/SD)"
    description: "운영 중 불필요한 물리적 포트(USB, SD카드 슬롯) 비활성화 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.12.1"

  - id: "PHY-002"
    category: "물리보안"
    title: "물리적 접근 감사로그"
    description: "물리적 접근(케이싱 오픈, 버튼 조작 등) 이벤트 감사로그 기록 여부 확인"
    method: "checklist"
    reference: "NIS 영상보안 2.12.2"

  # ── 운영 보안 ────────────────────────────────────────
  - id: "OPS-001"
    category: "운영보안"
